<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cristal CAD">
  <title>Cristal Templado CAD</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div id="title-area">
        <span id="app-title">Cristal CAD</span>
        <span id="line-info"></span>
      </div>
      <div id="header-actions">
        <button id="btn-undo" title="Deshacer">&#8617;</button>
        <button id="btn-clear" title="Limpiar">&#128465;</button>
        <button id="btn-menu" title="Menu">&#8942;</button>
      </div>
    </header>

    <!-- Canvas Area -->
    <main id="canvas-container">
      <canvas id="canvas"></canvas>
    </main>

    <!-- Bottom Toolbar -->
    <nav id="toolbar">
      <button class="tool-btn" id="btn-select" data-tool="select" title="Seleccionar">
        <svg viewBox="0 0 24 24"><path d="M4 4l7 18 3-7 7-3z"/></svg>
        <span>Sel.</span>
      </button>
      <button class="tool-btn active" id="btn-line" data-tool="line" title="Linea">
        <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke-width="2"/></svg>
        <span>Linea</span>
      </button>
      <button class="tool-btn" id="btn-rect" data-tool="rect" title="Rectangulo">
        <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="1"/></svg>
        <span>Rect.</span>
      </button>
      <button class="tool-btn" id="btn-play" id="btn-animate" title="Animar">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        <span>Play</span>
      </button>
      <button class="tool-btn" id="btn-export" title="Exportar PNG">
        <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3zM4 20h16v2H4z"/></svg>
        <span>PNG</span>
      </button>
    </nav>

    <!-- Floating Panel -->
    <div id="panel" class="hidden">
      <div id="panel-header">
        <span>Proyectos</span>
        <button id="btn-close-panel">&#10005;</button>
      </div>
      <div id="panel-body">
        <button class="panel-btn" id="btn-new">&#43; Nuevo proyecto</button>
        <button class="panel-btn" id="btn-save">&#128190; Guardar</button>
        <button class="panel-btn" id="btn-load-json">&#128193; Cargar JSON</button>
        <button class="panel-btn" id="btn-export-json">&#128196; Exportar JSON</button>
        <hr>
        <div id="projects-list"></div>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="toast"></div>

    <!-- Hidden file input -->
    <input type="file" id="file-input" accept=".json" style="display:none">
  </div>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js", { scope: "./" })
          .then(r => console.log("SW registrado:", r.scope))
          .catch(e => console.warn("SW error:", e));
      });
    }
  </script>
</body>
</html>
